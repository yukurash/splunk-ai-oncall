# ────────────────────────────────────────────────────────────────────────
# OpenTelemetry Demo の Collector に "足す" Splunk Observability Cloud 連携設定。
#
# Demo の Collector は contrib イメージなので、sapm / signalfx / splunk_hec
# exporter がそのまま使える（別途 Splunk ディストロに差し替える必要なし）。
#
# このファイルは demo の src/otelcollector/otelcol-config-extras.yml に置くと、
# 既定の otelcol-config.yml と "マージ" される。
#
# ⚠️ 重要: OTel Collector の複数 config マージでは、配列(list)は「結合」ではなく
#    「置換」される。したがって下の service.pipelines.*.exporters には
#    『Demo 既定の exporter 群 + Splunk の exporter』を**両方**列挙すること。
#    既定の exporter 名は demo のバージョンで変わるので、必ず
#    src/otelcollector/otelcol-config.yml を見て合わせること。
#    （下記は近年の demo を想定したサンプル値）
# ────────────────────────────────────────────────────────────────────────

exporters:
  # --- トレース → Splunk APM ---
  sapm:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    endpoint: "https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace"

  # --- メトリクス → Splunk Infrastructure/APM ---
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    realm: "${SPLUNK_REALM}"
    # APM の相関に必要なので、可能なら sync_host_metadata を有効に
    sync_host_metadata: true

  # --- ログ → Splunk O11y Log Observer (任意) ---
  splunk_hec/o11y:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    source: "otel"
    sourcetype: "otel"
    profiling_data_enabled: false

service:
  pipelines:
    # ↓↓↓ exporters は「demo 既定 + Splunk」を両方書く（置換されるため）↓↓↓
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp, debug, spanmetrics, sapm]      # ← sapm を追記
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/prometheus, debug, signalfx] # ← signalfx を追記
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [opensearch, debug, splunk_hec/o11y]   # ← splunk_hec を追記（ログ不要なら外す）
