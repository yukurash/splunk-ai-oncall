# ────────────────────────────────────────────────────────────────────────
# OpenTelemetry Demo v2.2.0 の Collector に "足す" Splunk O11y 連携。
# demo の src/otel-collector/otelcol-config-extras.yml を「これで上書き」する。
# （demo は既定で otelcol-config.yml + otelcol-config-extras.yml をこの順でロードし、
#   extras が最後に勝つ。collector イメージは contrib 0.151.0 なので
#   signalfx / sapm / splunk_hec exporter が同梱されている。）
#
# 構成: ローカルの observability スタック(Jaeger/Prometheus/OpenSearch)は使わず、
#       Splunk を唯一のバックエンドにする軽量モード。
#       => `docker compose -f compose.yaml -f ../docker-compose.splunk.yml up`
#
# ⚠️ 配列(list)はマージで「置換」される。下の exporters 配列は
#    『base の exporter（traces=[debug, span_metrics] / metrics=[debug] / logs=[debug]）
#    + Splunk』を両方列挙している。
#    もし compose.observability.yaml も併用するなら、jaeger/prometheus/opensearch の
#    exporter 名（otlp_grpc/jaeger, otlp_http/prometheus, opensearch）も足すこと。
#
# ⚠️ sapm は将来の collector で削除される可能性あり。起動後に collector ログで
#    エラーが出たら traces を otlphttp に切り替える（Splunk のドキュメント参照）。
# ────────────────────────────────────────────────────────────────────────

exporters:
  # メトリクス → Splunk O11y
  signalfx:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    realm: "${env:SPLUNK_REALM}"
    sync_host_metadata: true

  # トレース → Splunk APM
  sapm:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    endpoint: "https://ingest.${env:SPLUNK_REALM}.signalfx.com/v2/trace"

  # ログ → Splunk O11y Log Observer (任意)
  splunk_hec/o11y:
    token: "${env:SPLUNK_HEC_TOKEN}"
    endpoint: "${env:SPLUNK_HEC_URL}"
    source: "otel"
    sourcetype: "otel"

service:
  pipelines:
    traces:
      exporters: [debug, span_metrics, sapm]
    metrics:
      exporters: [debug, signalfx]
    logs:
      exporters: [debug, splunk_hec/o11y]
